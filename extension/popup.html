<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESI - Desty PDF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 180px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      padding: 16px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .header-text {
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .status-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      font-size: 20px;
    }

    .status-icon.detected {
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.25);
    }

    .status-icon.not-detected {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .status-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status-title.detected {
      color: #a78bfa;
    }

    .status-title.not-detected {
      color: #71717a;
    }

    .status-description {
      font-size: 11px;
      color: #71717a;
      line-height: 1.4;
    }

    .url-preview {
      font-size: 10px;
      color: #52525b;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      padding: 6px 8px;
      margin-top: 8px;
      word-break: break-all;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      max-height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: white;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(124, 58, 237, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .settings-label {
      font-size: 10px;
      color: #52525b;
      white-space: nowrap;
    }

    .settings-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 10px;
      color: #a1a1aa;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      outline: none;
    }

    .settings-input:focus {
      border-color: rgba(124, 58, 237, 0.4);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeIn 0.2s ease forwards;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">R</div>
    <span class="header-text">RESI Processor</span>
  </div>

  <div id="content" class="animate-in">
    <!-- Content injected by popup.js -->
  </div>

  <div class="settings-row">
    <span class="settings-label">App URL:</span>
    <input
      type="text"
      id="app-url"
      class="settings-input"
      placeholder="http://localhost:3000"
    />
  </div>

  <script src="popup.js"></script>
</body>
</html>
